trigger:
  - develop

pool:
  vmImage: windows-latest

parameters:
  - name: location
    type: string
    default: 'uksouth'
    values:
      - uksouth
      - northeurope

variables:
  - group: PlatformBuild

stages:
- stage: BuildTest
  displayName: 'Build and Test'
  jobs:
  - job:
    steps:
    - task: UseDotNet@2
      inputs:
        version: '10.0.x'

    - task: DotNetCoreCLI@2
      displayName: NuGet Restore
      inputs:
        command: 'restore'
        projects: '**/GovUk.Forms.slnx'

    - task: DotNetCoreCLI@2
      displayName: 'Build Solution'
      inputs:
        command: 'build'
        projects: '**/GovUk.Forms.slnx'
        arguments: '--configuration $(BuildConfiguration)'
          
    - task: DotNetCoreCLI@2
      displayName: 'Run Tests'
      inputs:
        command: test
        projects: '**/*Test/*.csproj'
        arguments: '--configuration $(BuildConfiguration) --filter "FullyQualifiedName!~UI.Test"'

    - task: DotNetCoreCLI@2
      displayName: 'Publish HostApp'
      condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
      inputs:
        command: 'publish'
        publishWebProjects: false
        projects: '**/GovUk.Forms.HostApp.csproj'
        arguments: '--configuration $(BuildConfiguration) --output $(Build.ArtifactStagingDirectory)'

    - task: DotNetCoreCLI@2
      displayName: 'Publish Broker'
      condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
      inputs:
        command: 'publish'
        publishWebProjects: false
        projects: '**/Inss.Auth.Broker.csproj'
        arguments: '--configuration $(BuildConfiguration) --output $(Build.ArtifactStagingDirectory)'

    - task: DotNetCoreCLI@2
      displayName: 'Publish RPS Provider'
      condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
      inputs:
        command: 'publish'
        publishWebProjects: false
        projects: '**/Inss.Auth.RpsProvider.csproj'
        arguments: '--configuration $(BuildConfiguration) --output $(Build.ArtifactStagingDirectory)'

    - task: DotNetCoreCLI@2
      displayName: 'Publish Submission Service'
      condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
      inputs:
        command: 'publish'
        publishWebProjects: false
        projects: '**/Inss.FormsSubmission.Service.csproj'
        arguments: '--configuration $(BuildConfiguration) --output $(Build.ArtifactStagingDirectory)'
        
    - task: PublishPipelineArtifact@1
      displayName: 'Publish Artifacts'
      condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)'
        artifactName: 'WebApps'

- stage: DeployDev
  condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
  dependsOn: BuildTest
  displayName: 'Deploy to Dev'
  variables:
    - group: Platform-Dev
  jobs:
    - template: ../deploy/azure-deployment.yml
      parameters:
        environment: 'Dev'
        location: ${{ parameters.location }}
        azureSubscription: $(AzureSubscription)
        
- stage: DeploySit
  condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
  dependsOn: DeployDev
  displayName: 'Deploy to Sit'
  variables:
    - group: Platform-Sit
  jobs:
    - template: ../deploy/azure-deployment.yml
      parameters:
        environment: 'Sit'
        location: ${{ parameters.location }}
        azureSubscription: $(AzureSubscription)