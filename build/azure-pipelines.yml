trigger:
  - develop

pool:
  vmImage: windows-latest

variables:
  - group: PlatformBuild

stages:
  - stage: BuildTest
    displayName: 'Build and Test'
    jobs:
    - job:
      steps:
      - task: UseDotNet@2
        inputs:
          version: '10.0.x'

      - task: Cache@2
        displayName: Cache NuGet Packages
        inputs:
          key: 'nuget | "$(Agent.OS)" | **/*.csproj, **/*.slnx'
          restoreKeys: |
            nuget | "$(Agent.OS)"
          path: $(Pipeline.Workspace)/.nuget/packages
      - 
      - task: DotNetCoreCLI@2
        displayName: NuGet Restore
        inputs:
          command: 'restore'
          projects: '**/GovUk.Forms.slnx'

      - task: DotNetCoreCLI@2
        displayName: 'Build Solution'
        inputs:
          command: 'build'
          projects: '**/GovUk.Forms.slnx'
          arguments: '--configuration $(BuildConfiguration)'

      - task: PowerShell@2
        displayName: Install Playwright Tooling
        inputs:
          targetType: 'inline'
          script: |
            cd test/host/GovUk.Forms.HostApp.PageTest
            bin/$(BuildConfiguration)/net10.0/playwright.ps1 install
            
      - task: DotNetCoreCLI@2
        displayName: 'Run Tests'
        inputs:
          command: test
          projects: '**/*Test/*.csproj'
          arguments: '--configuration $(BuildConfiguration)'

      - task: DotNetCoreCLI@2
        displayName: 'Publish HostApp'
        inputs:
          command: 'publish'
          publishWebProjects: false
          projects: '**/GovUk.Forms.HostApp.csproj'
          arguments: '--configuration $(BuildConfiguration) --output $(Build.ArtifactStagingDirectory)'

      - task: PublishPipelineArtifact@1
        displayName: 'Publish HostApp Artifact'
        inputs:
          targetPath: '$(Build.ArtifactStagingDirectory)'
          artifactName: 'GovUk.Forms.HostApp'
        condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))