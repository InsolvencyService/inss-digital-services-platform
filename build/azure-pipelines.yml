trigger:
  - develop

pool:
  vmImage: windows-latest

variables:
  - group: PlatformBuild

stages:
- stage: BuildTest
  displayName: 'Build and Test'
  jobs:
  - job:
    steps:
    - task: UseDotNet@2
      inputs:
        version: '10.0.x'

    - task: DotNetCoreCLI@2
      displayName: NuGet Restore
      inputs:
        command: 'restore'
        projects: '**/GovUk.Forms.slnx'

    - task: DotNetCoreCLI@2
      displayName: 'Build Solution'
      inputs:
        command: 'build'
        projects: '**/GovUk.Forms.slnx'
        arguments: '--configuration $(BuildConfiguration)'
          
    - task: DotNetCoreCLI@2
      displayName: 'Run Tests'
      inputs:
        command: test
        projects: '**/*Test/*.csproj'
        arguments: '--configuration $(BuildConfiguration) --filter "FullyQualifiedName!~UI.Test"'

    - task: DotNetCoreCLI@2
      displayName: 'Publish HostApp'
      inputs:
        command: 'publish'
        publishWebProjects: false
        projects: '**/GovUk.Forms.HostApp.csproj'
        arguments: '--configuration $(BuildConfiguration) --output $(Build.ArtifactStagingDirectory)'

    - task: DotNetCoreCLI@2
      displayName: 'Publish OIDC Broker'
      inputs:
        command: 'publish'
        publishWebProjects: false
        projects: '**/Inss.Auth.Broker.csproj'
        arguments: '--configuration $(BuildConfiguration) --output $(Build.ArtifactStagingDirectory)'

    - task: DotNetCoreCLI@2
      displayName: 'Publish OIDC RPS Provider'
      inputs:
        command: 'publish'
        publishWebProjects: false
        projects: '**/Inss.Auth.RpsProvider.csproj'
        arguments: '--configuration $(BuildConfiguration) --output $(Build.ArtifactStagingDirectory)'

    - task: PublishPipelineArtifact@1
      displayName: 'Publish Artifacts'
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)'
        artifactName: 'WebApps'
      condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
      
- stage: DeployDev
  condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
  dependsOn: BuildTest
  displayName: 'Deploy to Dev'
  variables:
    - group: Host-Dev
  jobs:
    - template: ../deploy/azure-deployment.yml
      parameters:
        environment: 'Dev'
        azureSubscription: $(AzureSubscription)