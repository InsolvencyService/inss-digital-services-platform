name: Build and Test on Pull Request

on:
  pull_request:
    branches:
      - develop

jobs:
  build:
    name: Build and Test Solution
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'