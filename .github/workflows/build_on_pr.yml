name: Build and Test on Pull Request

on:
  pull_request:
    branches:
      - develop

jobs:
  build:
    name: Build and Test Solution
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore INSS.Platform.sln

    - name: Build solution
      run: dotnet build INSS.Platform.sln --no-restore --configuration Release

    - name: Run tests with coverage
      run: dotnet test INSS.Platform.sln --no-build --configuration Release --collect:"XPlat Code Coverage" --results-directory ./TestResults

    - name: List coverage files (debug)
      run: |
        Write-Host "Listing all XML files in TestResults:"
        Get-ChildItem -Path ./TestResults -Recurse -Filter "*.xml" | ForEach-Object { Write-Host $_.FullName }
        Write-Host "Listing all cobertura files:"
        Get-ChildItem -Path ./TestResults -Recurse -Filter "*cobertura*" | ForEach-Object { Write-Host $_.FullName }

    - name: Report code coverage
      uses: danielpalme/ReportGenerator-GitHub-Action@5.1.26
      with:
        reports: 'TestResults/**/coverage.cobertura.xml'
        targetdir: 'coverage-report'
        reporttypes: 'HtmlInline_AzurePipelines'

    - name: Upload coverage report as artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage-report
